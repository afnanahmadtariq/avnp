name: Smoke production

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Full Git commit SHA deployed to the API and worker
        required: true
        type: string

concurrency:
  group: production-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Public boundary smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      url: https://relay.zerotools.online

    steps:
      - name: Checkout smoke checker
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pinned Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Test smoke checker offline
        run: node --test scripts/smoke-production.test.mjs

      - name: Verify public production boundaries
        env:
          RELAY_SMOKE_API_ORIGIN: https://api.zerotools.online
          RELAY_SMOKE_EXPECTED_VERSION: ${{ inputs.expected_version }}
          RELAY_SMOKE_WEB_ORIGIN: https://relay.zerotools.online
        run: node scripts/smoke-production.mjs
