name: Deploy VM

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Quality
    branches:
      - main
    types:
      - completed

concurrency:
  group: production-vm
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/relay-runtime
  RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  image:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout verified release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_SHA }}

      # The default Docker driver cannot export the GitHub Actions cache. Use
      # BuildKit in a managed container so cache-from/cache-to type=gha work.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image metadata
        id: metadata
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7 # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.revision=${{ env.RELEASE_SHA }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.RELEASE_SHA }}
            type=raw,value=main

      - name: Build and publish runtime image
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4 # v7.2.0
        with:
          build-args: |
            APP_VERSION=${{ env.RELEASE_SHA }}
            VCS_REF=${{ env.RELEASE_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          file: infra/production/Dockerfile
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}

  deploy:
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout deployment definition
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Configure SSH trust
        env:
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 "$RUNNER_TEMP/relay-ssh"
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > "$RUNNER_TEMP/relay-ssh/key"
          printf '%s\n' "$VM_SSH_KNOWN_HOSTS" > "$RUNNER_TEMP/relay-ssh/known_hosts"
          chmod 600 "$RUNNER_TEMP/relay-ssh/key" "$RUNNER_TEMP/relay-ssh/known_hosts"

      - name: Materialize protected production environment
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          test -n "$PROD_ENV_FILE"
          install -d -m 700 "$RUNNER_TEMP/relay-deploy"
          umask 077
          printf '%s\n' "$PROD_ENV_FILE" > "$RUNNER_TEMP/relay-deploy/.env"
          test -s "$RUNNER_TEMP/relay-deploy/.env"

      - name: Upload production definition and environment
        env:
          VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -i "$RUNNER_TEMP/relay-ssh/key" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o UserKnownHostsFile="$RUNNER_TEMP/relay-ssh/known_hosts" \
            -p "$VM_PORT" \
            "$VM_USER@$VM_HOST" \
            "install -d -m 750 '$VM_DEPLOY_PATH'"
          scp -i "$RUNNER_TEMP/relay-ssh/key" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o UserKnownHostsFile="$RUNNER_TEMP/relay-ssh/known_hosts" \
            -P "$VM_PORT" \
            infra/production/compose.yaml \
            infra/production/Caddyfile \
            infra/production/deploy.sh \
            "$RUNNER_TEMP/relay-deploy/.env" \
            "$VM_USER@$VM_HOST:$VM_DEPLOY_PATH/"
          ssh -i "$RUNNER_TEMP/relay-ssh/key" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o UserKnownHostsFile="$RUNNER_TEMP/relay-ssh/known_hosts" \
            -p "$VM_PORT" \
            "$VM_USER@$VM_HOST" \
            "chmod 600 '$VM_DEPLOY_PATH/.env' && chmod 700 '$VM_DEPLOY_PATH/deploy.sh' && test -s '$VM_DEPLOY_PATH/.env'"

      - name: Activate verified release
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.RELEASE_SHA }}
          IMAGE_SOURCE: ${{ github.server_url }}/${{ github.repository }}
          VM_DEPLOY_PATH: ${{ secrets.VM_DEPLOY_PATH }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_PORT: ${{ secrets.VM_PORT }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          ssh -i "$RUNNER_TEMP/relay-ssh/key" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o UserKnownHostsFile="$RUNNER_TEMP/relay-ssh/known_hosts" \
            -p "$VM_PORT" \
            "$VM_USER@$VM_HOST" \
            "RELAY_IMAGE='$IMAGE_REF' RELAY_IMAGE_SOURCE='$IMAGE_SOURCE' VM_DEPLOY_PATH='$VM_DEPLOY_PATH' sh '$VM_DEPLOY_PATH/deploy.sh'"

      - name: Remove runner environment copy
        if: always()
        run: rm -f "$RUNNER_TEMP/relay-deploy/.env"
