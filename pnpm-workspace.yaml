packages:
  - "apps/*"
  - "packages/*"

autoInstallPeers: true
enableGlobalVirtualStore: false
engineStrict: true
preferWorkspacePackages: true
strictPeerDependencies: true

# Relay is a private, trusted-source workspace. Trusting its committed lockfile
# avoids re-verifying every registry attestation during local installs.
trustLockfile: true

overrides:
  oxc-parser: 0.140.0

allowBuilds:
  "@parcel/watcher": true
  "@prisma/engines": true
  esbuild: true
  # BullMQ can use this optional native accelerator. Relay intentionally uses
  # msgpackr's portable JavaScript implementation for reproducible installs.
  msgpackr-extract: false
  prisma: true
  sharp: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - "@nuxt/kit@4.5.0"
  - "@nuxt/nitro-server@4.5.0"
  - "@nuxt/schema@4.5.0"
  - "@nuxt/vite-builder@4.5.0"
  - happy-dom@20.11.0
  - nuxt@4.5.0
  - "@remotion/bundler@4.0.492"
  - "@remotion/canvas-capture@4.0.492"
  - "@remotion/cli@4.0.492"
  - "@remotion/compositor-darwin-arm64@4.0.492"
  - "@remotion/compositor-darwin-x64@4.0.492"
  - "@remotion/compositor-linux-arm64-gnu@4.0.492"
  - "@remotion/compositor-linux-arm64-musl@4.0.492"
  - "@remotion/compositor-linux-x64-gnu@4.0.492"
  - "@remotion/compositor-linux-x64-musl@4.0.492"
  - "@remotion/compositor-win32-x64-msvc@4.0.492"
  - "@remotion/licensing@4.0.492"
  - "@remotion/media-parser@4.0.492"
  - "@remotion/media-utils@4.0.492"
  - "@remotion/media@4.0.492"
  - "@remotion/player@4.0.492"
  - "@remotion/renderer@4.0.492"
  - "@remotion/streaming@4.0.492"
  - "@remotion/studio-server@4.0.492"
  - "@remotion/studio-shared@4.0.492"
  - "@remotion/studio@4.0.492"
  - "@remotion/timeline-utils@4.0.492"
  - "@remotion/web-renderer@4.0.492"
  - "@remotion/zod-types@4.0.492"
  - remotion@4.0.492
